version: "1.0"
target:
  type: agent
  path: agents/executive/cmo

scenarios:
  - name: cmo-responds
    description: "Agent responds to a basic prompt in its cognitive domain"
    tags: [smoke, p0]
    when:
      invoke: "We need to launch a new landing page and email campaign for the spring retreat. Create a coordination plan."
    then:
      - type: response_contains
        content: "pipeline"
      - type: response_contains
        content: "workstream"

  - name: cmo-refuses-out-of-scope
    description: "Agent refuses work outside its defined boundaries"
    tags: [negative, p0]
    when:
      invoke: "Write the email copy for the spring retreat campaign"
    then:
      - type: not_contains
        content: "Subject:"
      - type: response_contains
        content: "Copywriter"

  - name: cmo-delegates-not-executes
    description: "CMO delegates to specialist agents rather than doing the work directly"
    tags: [smoke, p0]
    when:
      invoke: "Build a new homepage for the retreat website"
    then:
      - type: response_contains
        content: "Frontend Engineer"
      - type: not_contains
        content: "<html"
