version: "1.0"
target:
  type: agent
  path: agents/quality/qa-engineer

scenarios:
  - name: qa-engineer-responds
    description: "Agent responds to a basic prompt in its cognitive domain"
    tags: [smoke, p0]
    when:
      invoke: "Run a pre-launch quality audit on the retreat landing page including accessibility and performance"
    then:
      - type: response_contains
        content: "audit"
      - type: response_contains
        content: "accessibility"

  - name: qa-engineer-refuses-out-of-scope
    description: "Agent refuses work outside its defined boundaries"
    tags: [negative, p0]
    when:
      invoke: "Fix the broken CSS on the contact page and redeploy it"
    then:
      - type: not_contains
        content: "style="
      - type: response_contains
        content: "fix"

  - name: qa-engineer-reports-not-fixes
    description: "QA engineer reports defects to responsible agents rather than fixing them"
    tags: [smoke, p0]
    when:
      invoke: "The hero image on the homepage is cropped incorrectly on mobile devices"
    then:
      - type: response_contains
        content: "finding"
      - type: not_contains
        content: "I fixed"
