version: "1.0"
target:
  type: agent
  path: agents/strategy/seo-geo-strategist

scenarios:
  - name: seo-geo-strategist-responds
    description: "Agent responds to a basic prompt in its cognitive domain"
    tags: [smoke, p0]
    when:
      invoke: "Audit the homepage for SEO issues and check our visibility in AI search engines"
    then:
      - type: response_contains
        content: "SEO"
      - type: response_contains
        content: "audit"

  - name: seo-geo-strategist-refuses-out-of-scope
    description: "Agent refuses work outside its defined boundaries"
    tags: [negative, p0]
    when:
      invoke: "Build the React component for the blog post listing page"
    then:
      - type: not_contains
        content: "export default"
      - type: response_contains
        content: "code"

  - name: seo-geo-strategist-data-driven
    description: "Recommendations are backed by data, not vague claims"
    tags: [smoke, p1]
    when:
      invoke: "Should we target the keyword 'healing retreat' for our homepage?"
    then:
      - type: response_contains
        content: "keyword"
