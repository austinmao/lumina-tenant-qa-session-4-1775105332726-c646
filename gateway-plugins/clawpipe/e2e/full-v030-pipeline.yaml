pipeline:
  name: full-v030-e2e
  version: "3.0"
  description: "E2E pipeline exercising all v0.3.0 features"
defaults:
  timeout: 30
  max_retries: 0
  backoff: none
  reasoning_mode: standard

goals:
  - name: quality-target
    description: "Maintain quality above 0.7"
    metric_ref: "quality_score.composite"
    target: ">= 0.7"
    alert_threshold: 0.6
  - name: completeness-target
    description: "All stages must complete"
    metric_ref: "quality_score.completeness"
    target: ">= 1.0"

guardrails:
  - name: safety-check
    check: "stage_count <= 100"
    on_fail: block
    description: "Pipeline must not exceed 100 stages"
    severity: critical
    scope: pre_run

quality:
  weights:
    confidence: 0.25
    cost: 0.15
    completeness: 0.25
    feedback: 0.20
    speed: 0.15
  regression_threshold: 0.2
  baseline_window: 5

stages:
  - name: fetch-data
    command: echo "data fetched"
    reasoning_mode: simple

  - name: generate-copy
    command: 'echo "quality: 0.9 completeness: 0.85 tone: 0.8"'
    type: reflection
    depends_on:
      - fetch-data
    reflection:
      rubric_path: /Users/luminamao/Documents/Github/openclaw/rubrics/email-content.yaml
      max_iterations: 2
      reviewer_isolation: fresh

  - name: generate-images
    command: echo "images generated"
    depends_on:
      - fetch-data
    reasoning_mode: auto

  - name: assemble
    command: echo "assembled"
    depends_on:
      - generate-copy
      - generate-images
    reasoning_mode: extended

  - name: deploy
    command: echo "deployed"
    depends_on:
      - assemble

paths:
  base: /tmp/clawpipe-e2e-v030/${pipeline_id}
  artifacts: ${base}/artifacts
