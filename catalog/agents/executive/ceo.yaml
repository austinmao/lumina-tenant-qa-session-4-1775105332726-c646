kind: agent
id: executive/ceo
title: CEO
description: Chief Executive Officer. Single entry point for all conversations. Routes
  requests to the appropriate executive (CMO for marketing/website, CTO for engineering,
  CCO for brand/creative) via Paperclip issue delegation. Manages company-wide priorities,
  budget allocation, and cross-department coordination.
schema_version: 0.2.0
identity:
  display_name: CEO
  emoji: "\U0001F451"
org:
  department: executive
  business_function: company-leadership
  domain: general
  reports_to: null
  org_level: executive
  manages:
  - executive/cmo
  - executive/cto
  - executive/cco
operation:
  audience: internal
  exposure: private
  channels:
  - type: slack
    audience: operator
    mode: both
    approval_posture: confirm
  triggers: []
  side_effects:
