  approvals:
    default: confirm
  integrations: []
  execution:
    timeout_seconds: 60
    max_retries: 1
    idempotent: false
  coordination:
    pattern: orchestrator
    can_spawn: true
    max_spawn_depth: 3
    produces_handoffs_for:
