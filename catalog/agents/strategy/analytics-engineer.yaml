kind: agent
id: strategy/analytics-engineer
title: Analytics Engineer
description: Measurement and tracking specialist for Lumina OS. Sets up GA4, GTM,
  conversion tracking, event taxonomy, attribution modeling, and data storytelling
  dashboards.
schema_version: 0.2.0
identity:
  display_name: Analytics Engineer
  emoji: "\U0001F4CA"
org:
  department: strategy
  business_function: analytics-measurement
  domain: marketing
  reports_to: strategy/seo-geo-strategist
  org_level: ic
  manages: []
operation:
  audience: internal
  exposure: private
  channels:
  - type: slack
    audience: operator
    mode: both
    approval_posture: confirm
  triggers: []
  side_effects:
  - type: internal_write
    description: Creates tracking configurations, GTM containers, and analytics reports
  - type: external_write
    description: Configures GA4 properties and GTM tags
  approvals:
    default: confirm
  integrations:
  - ga4
  - gtm
  execution:
    timeout_seconds: 60
    max_retries: 1
    idempotent: true
  coordination:
    pattern: worker
    can_spawn: false
    max_spawn_depth: 0
    accepts_handoffs_from:
    - strategy/seo-geo-strategist
    - executive/cmo
  escalation:
    chain:
    - strategy/seo-geo-strategist
    - executive/cmo
    - operator
    timeout_seconds: 300
    fallback_behavior: escalate
  resilience:
    circuit_breaker_threshold: 3
    fallback_agent: null
  scheduling:
    max_concurrent: 2
    quiet_hours: null
    sla_response_seconds: 3600
policy:
  cognition:
    complexity: medium
    cost_posture: standard
    risk_posture: low
  memory:
    retrieval_mode: universal_file
    namespaces:
    - strategy
    - shared
    write_permitted: true
    fallback_behavior: file_only
    routing_compatible: true
  security:
    strict: true
    prompt_injection_guard: true
    secret_handling: env_only
    allowed_tools:
    - read
    - write
    - exec
    denied_tools: []
  resource_limits:
    max_tokens_per_session: 80000
    max_sessions_per_day: 10
    max_outbound_per_day: 5
  compliance:
    data_classification: internal
    handles_pii: false
    handles_phi: false
    retention_days: 90
  observability:
    log_level: standard
    cost_tracking: true
    alert_on_failure: true
    paperclip_sync: true
  qa:
    enabled: true
    categories:
      smoke: true
      contract: true
      integration: false
      security: true
      drift: true
      golden: true
    required_pass_rate: 1.0
  documentation:
    generate_registry_entry: true
    generate_claude_md_section: true
    sections: []
  profiles:
  - base/standard
  - security/standard
  - qa/standard
  - memory/standard
governance:
  paperclip:
    export: true
    agent_type: null
    include_in_org_chart: true
    include_in_heartbeat: false
    issue_id: null
  visibility: internal
  budget_tier: standard
  risk_tier: low
  approval_tier: low
  five_forces:
    forces:
    - parallel_execution
    - cognitive_mode
    justification: "Parallel execution (in a website build pipeline, Analytics Engineer\
      \ sets up GA4, configures GTM, implements event taxonomy concurrently with Frontend\
      \ building UI and Backend building APIs), different cognitive mode (thinks in\
      \ data flows, events, and measurement \u2014 not user interfaces or API contracts)"
provenance:
  created_at: '2026-03-17T00:00:00Z'
  updated_at: '2026-03-17T00:00:00Z'
  lifecycle: managed
  source: scaffold-adopt
agent:
  heartbeat:
    enabled: false
    cadence_minutes: 60
    checklist: []
  workspace_files:
  - SOUL.md
  - AGENTS.md
  - MEMORY.md
  soul_voice_section: Who I Am
  tools_allowlist:
  - read
  - write
  - exec
  tools_denylist: []
