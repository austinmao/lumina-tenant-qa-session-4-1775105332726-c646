kind: agent
id: quality/qa-engineer
title: QA Engineer
description: Quality assurance specialist for Lumina OS. Performs adversarial testing,
  accessibility audits, performance audits, cross-browser testing, brand compliance
  checks, and campaign TDD.
schema_version: 0.2.0
identity:
  display_name: QA Engineer
  emoji: "\U0001F50E"
org:
  department: quality
  business_function: quality-assurance
  domain: marketing
  reports_to: executive/cco
  org_level: ic
  manages: []
operation:
  audience: internal
  exposure: private
  channels:
  - type: slack
    audience: operator
    mode: both
    approval_posture: confirm
  triggers: []
  side_effects:
  - type: read_only
  - type: internal_write
    description: Creates test reports, audit findings, and compliance records
  approvals:
    default: confirm
  integrations: []
  execution:
    timeout_seconds: 120
    max_retries: 1
    idempotent: true
  coordination:
    pattern: standalone
    can_spawn: false
    max_spawn_depth: 0
    accepts_handoffs_from:
    - executive/cmo
    - campaigns/campaign-orchestrator
    - engineering/frontend-engineer
  escalation:
    chain:
    - executive/cmo
    - operator
    timeout_seconds: 300
    fallback_behavior: escalate
  resilience:
    circuit_breaker_threshold: 3
    fallback_agent: null
  scheduling:
    max_concurrent: 3
    quiet_hours: null
    sla_response_seconds: 3600
policy:
  cognition:
    complexity: medium
    cost_posture: standard
    risk_posture: low
  memory:
    retrieval_mode: universal_file
    namespaces:
    - quality
    - shared
    write_permitted: true
    fallback_behavior: file_only
    routing_compatible: true
  security:
    strict: true
    prompt_injection_guard: true
    secret_handling: env_only
    allowed_tools:
    - read
    - write
    - exec
    denied_tools: []
  resource_limits:
    max_tokens_per_session: 80000
    max_sessions_per_day: 20
    max_outbound_per_day: 10
  compliance:
    data_classification: internal
    handles_pii: false
    handles_phi: false
    retention_days: 90
  observability:
    log_level: standard
    cost_tracking: true
    alert_on_failure: true
    paperclip_sync: true
  qa:
    enabled: true
    categories:
      smoke: true
      contract: true
      integration: true
      security: true
      drift: true
      golden: true
    required_pass_rate: 1.0
  documentation:
    generate_registry_entry: true
    generate_claude_md_section: true
    sections: []
  profiles:
  - base/standard
  - security/standard
  - qa/standard
  - memory/standard
governance:
  paperclip:
    export: true
    agent_type: null
    include_in_org_chart: true
    include_in_heartbeat: false
    issue_id: null
  visibility: internal
  budget_tier: standard
  risk_tier: low
  approval_tier: low
  five_forces:
    forces:
    - cognitive_mode
    justification: "Different cognitive mode (adversarial testing \u2014 fundamentally\
      \ opposite to creation; the QA engineer's job is to break what other agents\
      \ built)"
provenance:
  created_at: '2026-03-17T00:00:00Z'
  updated_at: '2026-03-17T00:00:00Z'
  lifecycle: managed
  source: scaffold-adopt
agent:
  heartbeat:
    enabled: false
    cadence_minutes: 60
    checklist: []
  workspace_files:
  - SOUL.md
  - AGENTS.md
  - MEMORY.md
  soul_voice_section: Who I Am
  tools_allowlist:
  - read
  - write
  - exec
  tools_denylist: []
