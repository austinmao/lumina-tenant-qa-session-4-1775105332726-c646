kind: agent
id: engineering/devops-engineer
title: DevOps Engineer
description: Infrastructure and deployment specialist for Lumina OS. Manages CI/CD,
  Vercel deployments, DNS, CDN (R2), secrets, security audits, and uptime monitoring.
schema_version: 0.2.0
identity:
  display_name: DevOps Engineer
  emoji: "\U0001F6E0"
org:
  department: engineering
  business_function: infrastructure
  domain: engineering
  reports_to: executive/cto
  org_level: ic
  manages: []
operation:
  audience: internal
  exposure: private
  channels:
  - type: slack
    audience: operator
    mode: both
    approval_posture: require_approval
  triggers: []
  side_effects:
  - type: external_write
    description: Deploys to production, modifies DNS records, manages secrets
  - type: publish_content
    description: Triggers Vercel deployments and CDN invalidations
  approvals:
    default: require_approval
  integrations:
  - vercel
  - github
  - cloudflare
  execution:
    timeout_seconds: 300
    max_retries: 1
    idempotent: false
  coordination:
    pattern: worker
    can_spawn: false
    max_spawn_depth: 0
    accepts_handoffs_from:
    - engineering/frontend-engineer
    - executive/cmo
  escalation:
    chain:
    - engineering/frontend-engineer
    - executive/cmo
    - operator
    timeout_seconds: 300
    fallback_behavior: escalate
  resilience:
    circuit_breaker_threshold: 3
    fallback_agent: null
  scheduling:
    max_concurrent: 1
    quiet_hours: null
    sla_response_seconds: 1800
policy:
  cognition:
    complexity: medium
    cost_posture: standard
    risk_posture: low
  memory:
    retrieval_mode: universal_file
    namespaces:
    - engineering
    - shared
    write_permitted: true
    fallback_behavior: file_only
    routing_compatible: true
  security:
    strict: true
    prompt_injection_guard: true
    secret_handling: env_only
    allowed_tools:
    - read
    - write
    - exec
    denied_tools: []
  resource_limits:
    max_tokens_per_session: 80000
    max_sessions_per_day: 10
    max_outbound_per_day: 5
  compliance:
    data_classification: confidential
    handles_pii: false
    handles_phi: false
    retention_days: 180
  observability:
    log_level: verbose
    cost_tracking: true
    alert_on_failure: true
    paperclip_sync: true
  qa:
    enabled: true
    categories:
      smoke: true
      contract: true
      integration: true
      security: true
      drift: true
      golden: true
    required_pass_rate: 1.0
  documentation:
    generate_registry_entry: true
    generate_claude_md_section: true
    sections: []
  profiles:
  - base/standard
  - security/strict
  - qa/standard
  - memory/standard
governance:
  paperclip:
    export: true
    agent_type: null
    include_in_org_chart: true
    include_in_heartbeat: false
    issue_id: null
  visibility: internal
  budget_tier: standard
  risk_tier: high
  approval_tier: high
  five_forces:
    forces:
    - trust_boundary
    justification: Different trust boundary (access to deployment systems, CI/CD secrets,
      DNS, production environments)
provenance:
  created_at: '2026-03-17T00:00:00Z'
  updated_at: '2026-03-17T00:00:00Z'
  lifecycle: managed
  source: scaffold-adopt
agent:
  heartbeat:
    enabled: false
    cadence_minutes: 60
    checklist: []
  workspace_files:
  - SOUL.md
  - AGENTS.md
  - MEMORY.md
  soul_voice_section: Who I Am
  tools_allowlist:
  - read
  - write
  - exec
  tools_denylist: []
