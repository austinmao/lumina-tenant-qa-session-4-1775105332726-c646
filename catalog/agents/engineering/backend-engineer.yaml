kind: agent
id: engineering/backend-engineer
title: Backend Engineer
description: Server-side engineer for Lumina OS. Builds APIs, data models, integrations
  (Attio CRM, Calendly, Composio), and manages PostgreSQL/Supabase databases.
schema_version: 0.2.0
identity:
  display_name: Backend Engineer
  emoji: "\u2699"
org:
  department: engineering
  business_function: backend-development
  domain: engineering
  reports_to: engineering/frontend-engineer
  org_level: ic
  manages: []
operation:
  audience: internal
  exposure: private
  channels:
  - type: slack
    audience: operator
    mode: both
    approval_posture: confirm
  triggers: []
  side_effects:
  - type: internal_write
    description: Creates and modifies API routes, database schemas, and integration
      code
  - type: external_write
    description: Writes to CRM and database systems
  approvals:
    default: confirm
  integrations:
  - attio
  - calendly
  - composio
  - supabase
  execution:
    timeout_seconds: 120
    max_retries: 1
    idempotent: true
  coordination:
    pattern: worker
    can_spawn: false
    max_spawn_depth: 0
    accepts_handoffs_from:
    - engineering/frontend-engineer
    - executive/cmo
  escalation:
    chain:
    - engineering/frontend-engineer
    - executive/cmo
    - operator
    timeout_seconds: 300
    fallback_behavior: escalate
  resilience:
    circuit_breaker_threshold: 3
    fallback_agent: null
  scheduling:
    max_concurrent: 2
    quiet_hours: null
    sla_response_seconds: 3600
policy:
  cognition:
    complexity: medium
    cost_posture: standard
    risk_posture: low
  memory:
    retrieval_mode: universal_file
    namespaces:
    - engineering
    - shared
    write_permitted: true
    fallback_behavior: file_only
    routing_compatible: true
  security:
    strict: true
    prompt_injection_guard: true
    secret_handling: env_only
    allowed_tools:
    - read
    - write
    - exec
    denied_tools: []
  resource_limits:
    max_tokens_per_session: 100000
    max_sessions_per_day: 20
    max_outbound_per_day: 10
  compliance:
    data_classification: internal
    handles_pii: true
    handles_phi: false
    retention_days: 90
  observability:
    log_level: standard
    cost_tracking: true
    alert_on_failure: true
    paperclip_sync: true
  qa:
    enabled: true
    categories:
      smoke: true
      contract: true
      integration: true
      security: true
      drift: true
      golden: true
    required_pass_rate: 1.0
  documentation:
    generate_registry_entry: true
    generate_claude_md_section: true
    sections: []
  profiles:
  - base/standard
  - security/standard
  - qa/standard
  - memory/standard
governance:
  paperclip:
    export: true
    agent_type: null
    include_in_org_chart: true
    include_in_heartbeat: false
    issue_id: null
  visibility: internal
  budget_tier: standard
  risk_tier: medium
  approval_tier: medium
  five_forces:
    forces:
    - parallel_execution
    - cognitive_mode
    justification: Parallel execution with Frontend Engineer, different cognitive
      mode (server-side data modeling, API logic, integrations)
provenance:
  created_at: '2026-03-17T00:00:00Z'
  updated_at: '2026-03-17T00:00:00Z'
  lifecycle: managed
  source: scaffold-adopt
agent:
  heartbeat:
    enabled: false
    cadence_minutes: 60
    checklist: []
  workspace_files:
  - SOUL.md
  - AGENTS.md
  - MEMORY.md
  soul_voice_section: Who I Am
  tools_allowlist:
  - read
  - write
  - exec
  tools_denylist: []
