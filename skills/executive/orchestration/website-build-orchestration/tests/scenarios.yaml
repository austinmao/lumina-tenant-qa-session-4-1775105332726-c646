version: '1.0'
target:
  type: skill
  path: skills/executive/orchestration/website-build-orchestration
  trigger: /website-build-orchestration
defaults:
  timeout: 120
  test_mode: true
scenarios:
- name: website-build-orchestration-smoke
  description: Orchestrate a website build from blueprint through deployment.
  tags:
  - smoke
  - p0
  when:
    invoke: /website-build-orchestration Orchestrate build of the example.com product
      site
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/website-build-plan.md
    timeout: 120
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/website-build-plan.md
    sections:
    - blueprint
    - deploy
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: website-build-orchestration-edge-tdd-gate
  description: TDD gate blocks deployment when tests fail.
  tags:
  - edge
  - p1
  when:
    invoke: /website-build-orchestration Build with TDD gate enforcement and intentional
      test failure
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/website-build-plan.md
    sections:
    - TDD
    - gate
  - type: no_span_errors
