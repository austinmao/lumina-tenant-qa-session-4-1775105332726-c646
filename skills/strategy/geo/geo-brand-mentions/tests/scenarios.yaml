version: '1.0'
target:
  type: skill
  path: skills/strategy/geo/geo-brand-mentions
  trigger: /geo-brand-mentions
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: geo-brand-mentions-smoke
  description: Brand mention scan produces a Brand Authority Score.
  tags:
  - smoke
  - p0
  when:
    invoke: /geo-brand-mentions example.org
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/geo-brand-mentions-report.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/geo-brand-mentions-report.md
    sections:
    - YouTube
    - Reddit
    - Wikipedia
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: geo-brand-mentions-none
  description: Brand with no presence scores near zero.
  tags:
  - edge
  - p1
  when:
    invoke: /geo-brand-mentions example.org
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/geo-brand-mentions-report.md
    sections:
    - Score
  - type: no_span_errors
