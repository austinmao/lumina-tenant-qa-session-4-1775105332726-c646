version: '1.0'
target:
  type: skill
  path: skills/strategy/geo/geo-report-pdf
  trigger: /geo-report-pdf
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: geo-report-pdf-smoke
  description: PDF report generation produces a formatted PDF.
  tags:
  - smoke
  - p0
  when:
    invoke: /geo-report-pdf example.org
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/GEO-REPORT.pdf
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/GEO-REPORT.pdf
    sections:
    - PDF
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: geo-report-pdf-missing
  description: Missing audit data produces error.
  tags:
  - edge
  - p1
  when:
    invoke: /geo-report-pdf example.org
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/GEO-REPORT.pdf
    sections:
    - error
  - type: no_span_errors
