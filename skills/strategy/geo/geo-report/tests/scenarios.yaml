version: '1.0'
target:
  type: skill
  path: skills/strategy/geo/geo-report
  trigger: /geo-report
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: geo-report-smoke
  description: GEO report produces a professional client-ready deliverable.
  tags:
  - smoke
  - p0
  when:
    invoke: /geo-report example.org
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/geo-client-report.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/geo-client-report.md
    sections:
    - Executive Summary
    - GEO Readiness Score
    - Action Plan
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: geo-report-no-audit
  description: Report without prior audit data prompts for audit.
  tags:
  - edge
  - p1
  when:
    invoke: /geo-report example.org
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/geo-client-report.md
    sections:
    - audit
  - type: no_span_errors
