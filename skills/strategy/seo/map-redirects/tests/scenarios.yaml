version: '1.0'
target:
  type: skill
  path: skills/website/map-redirects
  trigger: /map-redirects
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: redirects-smoke
  description: Invoking redirect mapping produces a redirect map with old-to-new URL
    mappings and generated config.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /map-redirects --source old-sitemap.xml
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/redirect-map.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/redirect-map.md
    sections:
    - Redirect Map
    - Mapped Redirects
    - Generated Config
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: redirects-no-site
  description: Invoking without an active site does not produce a redirect map.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /map-redirects --source old-sitemap.xml
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
