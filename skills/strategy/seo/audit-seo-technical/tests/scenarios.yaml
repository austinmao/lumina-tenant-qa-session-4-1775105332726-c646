version: '1.0'
target:
  type: skill
  path: skills/website/audit-seo-technical
  trigger: /audit-seo-technical
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: seo-audit-smoke
  description: Invoking the SEO technical audit produces a report with severity sections.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /audit-seo-technical
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/seo-technical-audit.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/seo-technical-audit.md
    sections:
    - SEO Technical Audit
    - Critical
    - Warning
    - Passed
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: seo-audit-no-site
  description: Invoking without an active site does not produce a report.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /audit-seo-technical
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: http.get
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
