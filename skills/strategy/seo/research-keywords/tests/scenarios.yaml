version: '1.0'
target:
  type: skill
  path: skills/website/research-keywords
  trigger: /research-keywords
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: keywords-smoke
  description: Invoking keyword research produces a report with keyword clusters and
    editorial calendar.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /research-keywords "plant medicine retreats"
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/keyword-research.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/keyword-research.md
    sections:
    - Keyword Clusters
    - Content Gaps
    - Editorial Calendar
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: keywords-no-site
  description: Invoking without an active site does not produce keyword output.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /research-keywords "plant medicine retreats"
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
