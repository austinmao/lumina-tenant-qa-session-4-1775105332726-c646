version: '1.0'
target:
  type: skill
  path: skills/website/discovery
  trigger: /website-discovery
defaults:
  timeout: 120
  test_mode: true
scenarios:
- name: discovery-reads-site-context
  description: Invoking website discovery reads the brand guide from the brand_root
    path in site-context.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /website-discovery
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/site-context.yaml
    sections:
    - brand_root
  - &id001
    type: no_span_errors
  - &id002
    type: tool_not_invoked
    tool: shell.execute
- name: discovery-smoke
  description: Invoking website discovery produces a discovery brief with brand context
    and website-specific decisions.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /website-discovery
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: docs/website/discovery-brief.md
    timeout: 120
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: docs/website/discovery-brief.md
    sections:
    - Website Discovery Brief
    - Brand Context
    - Primary audience
    - Primary CTA
  - *id001
  - *id002
- name: discovery-no-site
  description: Invoking without an active site does not produce a discovery brief.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /website-discovery
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
