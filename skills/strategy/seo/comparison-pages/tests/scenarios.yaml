version: '1.0'
target:
  type: skill
  path: skills/strategy/seo/comparison-pages
  trigger: /comparison-pages
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: comparison-pages-smoke
  description: Comparison pages produces decision-education content.
  tags:
  - smoke
  - p0
  when:
    invoke: /comparison-pages example.org
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/comparison-page-draft.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/drafts/comparison-page-draft.md
    sections:
    - Comparison
    - Decision
    - Modality
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: comparison-pages-ethics
  description: Content positions as guide, never attack.
  tags:
  - edge
  - p1
  when:
    invoke: /comparison-pages example.org
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/drafts/comparison-page-draft.md
    sections:
    - guide
  - type: no_span_errors
