version: '1.0'
target:
  type: skill
  path: skills/strategy/seo/information-architecture
  trigger: /information-architecture
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: information-architecture-smoke
  description: IA produces a strategic brief with goals.
  tags:
  - smoke
  - p0
  when:
    invoke: /information-architecture example.org
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/information-architecture-brief.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/information-architecture-brief.md
    sections:
    - Strategic Brief
    - Goals
    - Requirements
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: ia-multi-audience
  description: Multi-audience sites get separate flows.
  tags:
  - edge
  - p1
  when:
    invoke: /information-architecture example.org
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/information-architecture-brief.md
    sections:
    - audience
  - type: no_span_errors
