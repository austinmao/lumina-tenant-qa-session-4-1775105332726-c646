version: '1.0'
target:
  type: skill
  path: skills/strategy/analytics/dashboard-building
  trigger: /dashboard-building
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: dashboard-building-smoke
  description: Dashboard design produces KPI layout spec.
  tags:
  - smoke
  - p0
  when:
    invoke: /dashboard-building example.org
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/dashboard-design-spec.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/dashboard-design-spec.md
    sections:
    - KPI
    - Metric
    - Dashboard
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: dashboard-mixing-levels
  description: Mixed strategic/operational KPIs flagged.
  tags:
  - edge
  - p1
  when:
    invoke: /dashboard-building example.org
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/dashboard-design-spec.md
    sections:
    - level
  - type: no_span_errors
