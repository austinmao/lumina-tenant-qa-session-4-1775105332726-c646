version: '1.0'
target:
  type: skill
  path: skills/creative/brand/strategy
  trigger: /brand-strategy
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: brand-strategy-smoke
  description: Invoking brand-strategy produces a positioning statement and messaging
    hierarchy grounded in brand context.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /brand-strategy positioning for new retreat series
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/brand-strategy-brief.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/brand-strategy-brief.md
    sections:
    - Positioning
    - Messaging Hierarchy
    - Differentiation
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: brand-strategy-multi-brand-80-20
  description: Multi-brand strategy recommendation flags violations of the 80/20 master-brand
    rule.
  tags:
  - edge
  - p1
  when:
    invoke: /brand-strategy sub-brand strategy where accent exceeds master brand
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/brand-strategy-brief.md
    sections:
    - 80/20
  - type: no_span_errors
