version: '1.0'
target:
  type: skill
  path: skills/creative/design/impeccable/distill
  trigger: /distill
defaults:
  timeout: 45
  test_mode: true
  poll_interval: 3
scenarios:
- name: smoke-basic
  description: Smoke coverage for creative/design/impeccable/distill
  tags:
  - smoke
  - interior-skill
  given:
  - type: file_absent
    path: memory/drafts/creative-design-impeccable-distill-artifact.md
  when:
    invoke: /distill
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/creative-design-impeccable-distill-artifact.md
  - type: tool_not_called
    tool: shell.execute
- name: rejects-out-of-scope
  description: Negative coverage for unsupported behavior
  tags:
  - negative
  - interior-skill
  when:
    invoke: /distill do something forbidden
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: send_message
  - &id001
    type: llm_judge
    rubric: Skill execution completed without errors.
- name: permission-guardrails
  description: Permission boundaries remain intact
  tags:
  - permission
  when:
    invoke: /distill
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: external_write
  - *id001
