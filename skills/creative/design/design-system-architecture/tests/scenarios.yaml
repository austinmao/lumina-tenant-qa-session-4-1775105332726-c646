version: '1.0'
target:
  type: skill
  path: skills/creative/design/design-system-architecture
  trigger: /design-system-architecture
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: design-system-architecture-smoke
  description: Generating a design system from brand tokens produces CSS, Tailwind
    config, and component mapping files.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /design-system-architecture --primary "#8b7355" --secondary "#1a1a1a"
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/design-system-architecture.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/design-system-architecture.md
    sections:
    - Design System Architecture Report
    - Token Summary
    - Component Mappings
    - Files Generated
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: design-system-architecture-no-site
  description: Invoking without an active site does not generate any design system
    files.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /design-system-architecture --primary "#8b7355"
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - &id001
    type: no_span_errors
- name: design-system-architecture-no-color
  description: Invoking without any color input prompts the user for a primary color.
  tags:
  - negative
  - p1
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /design-system-architecture
    params:
      test_mode: true
  then:
  - type: not_contains
    content: design-tokens.css
  - *id001
