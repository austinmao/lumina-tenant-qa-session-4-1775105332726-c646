version: '1.0'
target:
  type: skill
  path: skills/website/design-motion
  trigger: /design-motion
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: motion-smoke
  description: Invoking motion design produces a spec with animation table, reduced
    motion fallback, and Framer Motion code.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /design-motion --component "hero section" --interaction entrance
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/motion-spec.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/motion-spec.md
    sections:
    - Motion Spec
    - Animation Table
    - Reduced Motion Fallback
    - Code
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: motion-no-site
  description: Invoking without an active site does not produce a motion spec.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /design-motion --component "hero section" --interaction entrance
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
