version: '1.0'
target:
  type: skill
  path: skills/creative/design/figma-integration
  trigger: /figma-integration
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: figma-integration-smoke
  description: Figma integration with a valid file key produces component code and
    token mapping.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /figma-integration --file-key "test_file_key" --frame "Homepage"
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/figma-integration-homepage.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/figma-integration-homepage.md
    sections:
    - Figma Integration
    - token
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: figma-integration-no-token
  description: Invoking without FIGMA_ACCESS_TOKEN env var does not attempt API calls.
  tags:
  - negative
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  - type: env_absent
    var: FIGMA_ACCESS_TOKEN
  when:
    invoke: /figma-integration --file-key "test_file_key"
    params:
      test_mode: true
  then:
  - type: not_contains
    content: api.figma.com
  - type: no_span_errors
