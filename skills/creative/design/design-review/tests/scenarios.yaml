version: '1.0'
target:
  type: skill
  path: skills/creative/design/design-review
  trigger: /design-review
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: design-review-smoke
  description: Running a design review on a page produces a scored 5-dimension report
    with actionable fixes.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /design-review --target "homepage" --stage implementation
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/design-review-homepage.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/design-review-homepage.md
    sections:
    - Score Summary
    - Accessibility
    - Usability
    - Visual Consistency
    - Rating
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: design-review-no-site
  description: Invoking without an active site does not produce a review report.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /design-review --target "homepage" --stage implementation
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
