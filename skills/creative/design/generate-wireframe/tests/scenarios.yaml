version: '1.0'
target:
  type: skill
  path: skills/website/generate-wireframe
  trigger: /generate-wireframe
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: wireframe-smoke
  description: Invoking wireframe generation produces ASCII wireframes for desktop
    and mobile viewports.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /generate-wireframe --page homepage
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/wireframe.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/wireframe.md
    sections:
    - Wireframe
    - Desktop
    - Mobile
    - Annotations
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: wireframe-no-site
  description: Invoking without an active site does not produce a wireframe.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /generate-wireframe --page homepage
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
