version: '1.0'
target:
  type: skill
  path: skills/creative/design/design-templates
  trigger: /design-templates
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: design-templates-smoke
  description: Generating a landing page template produces page component, spec, and
    content slots documentation.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /design-templates --category landing
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/design-template-landing.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/design-template-landing.md
    sections:
    - Design Template
    - Sections
    - Components
    - Responsive Summary
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: design-templates-invalid-category
  description: Providing an unsupported template category does not generate files.
  tags:
  - negative
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /design-templates --category "blockchain"
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
