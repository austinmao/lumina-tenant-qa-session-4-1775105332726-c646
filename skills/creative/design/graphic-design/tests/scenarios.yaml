version: '1.0'
target:
  type: skill
  path: skills/creative/design/graphic-design
  trigger: /graphic-design
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: graphic-design-smoke
  description: Generating a social media graphic produces SVG output and design spec.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /graphic-design --type "social media" --platform instagram --content "Spring
      Retreat 2026"
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/graphic-design-social-media.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/graphic-design-social-media.md
    sections:
    - Graphic Design
    - Asset Spec
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: graphic-design-unsupported-type
  description: Requesting an unsupported asset type does not produce output.
  tags:
  - negative
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /graphic-design --type "billboard"
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.write
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
