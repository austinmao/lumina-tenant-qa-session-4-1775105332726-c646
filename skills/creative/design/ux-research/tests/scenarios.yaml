version: '1.0'
target:
  type: skill
  path: skills/creative/design/ux-research
  trigger: /ux-research
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: ux-research-smoke
  description: Invoking ux-research produces a research artifact with personas, journey
    maps, or evidence reports.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /ux-research create user personas for retreat attendees
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/ux-research-report.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/ux-research-report.md
    sections:
    - Persona
    - Goals
    - Frustrations
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: ux-research-evidence-report
  description: Evidence reports include confidence levels and downstream impact.
  tags:
  - edge
  - p1
  given:
  - type: invoke
    command: /site tenant-a
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /ux-research evidence report for webinar landing page conversion
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/ux-research-report.md
    sections:
    - Evidence
    - Confidence
    - Recommendation
  - type: no_span_errors
