version: "1.0"

handoff:
  from: agents-frontend-designer
  to: agents-frontend-engineer
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: responsive_breakpoints
      description: "Canvas-approved responsive behavior and presentation layout."
    - name: implementation_notes
      description: "Any handoff notes required for Nova's implementation."
    - name: asset_path_rules
      description: "Nova must use root-relative public asset paths and keep the HTML self-contained."
  required_artifacts:
    - path_pattern: memory/drafts/webinars/{{today}}-*-design-spec.md
      description: "Approved design specification."
    - path_pattern: memory/drafts/webinars/{{today}}-*-copy.md
      description: "Copy to apply verbatim during the build."

callee_produces:
  required_artifacts:
    - path_pattern: "{{home_dir}}/webinars/{{today}}-*.html"
      description: "Standalone webinar HTML preview generated by Nova."
  state_updates:
    - description: "Nova builds the HTML deck with inline assets and responsive behavior."
  prohibited_actions:
    - tool: resend.send
      reason: "Nova builds the deck and does not send outbound communications."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-frontend-designer
      to_agent: agents-frontend-engineer
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: artifact_exists
      path: "{{home_dir}}/webinars/{{today}}-*.html"
