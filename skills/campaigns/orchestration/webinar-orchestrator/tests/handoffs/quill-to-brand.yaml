version: "1.0"

handoff:
  from: agents-marketing-copywriter
  to: agents-marketing-brand
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: brand_pillars
      description: "Brand positioning, proof points, and voice constraints."
    - name: approval_policy
      description: "All publishing remains gated behind Austin approval."
    - name: prohibited_claims
      description: "The copy must avoid hype, unverifiable claims, and prohibited medical language."
  required_artifacts:
    - path_pattern: memory/drafts/webinars/{{today}}-*-copy.md
      description: "Draft slide copy awaiting brand review."

callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/webinars/{{today}}-*-copy.md
      description: "Brand-reviewed copy still ready for downstream design."
      required_sections:
        - Slide 1
        - speaker note
  state_updates:
    - description: "Brand reviews the webinar copy for voice, credibility, and prohibited claims before design begins."
  prohibited_actions:
    - tool: resend.send
      reason: "Brand reviews copy but never sends."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-copywriter
      to_agent: agents-marketing-brand
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/webinars/{{today}}-*-copy.md
    - type: artifact_contains
      path: memory/drafts/webinars/{{today}}-*-copy.md
      sections:
        - Slide 1
        - speaker note
