version: "1.0"

handoff:
  from: agents-marketing-brand
  to: agents-frontend-designer
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: brand_system
      description: "Brand design tokens, typography, and CTA rules."
    - name: slide_flow
      description: "Approved copy structure and stage sequencing."
    - name: design_review_gate
      description: "Canvas receives copy only after brand review is complete and approval posture is preserved."
  required_artifacts:
    - path_pattern: memory/drafts/webinars/{{today}}-*-copy.md
      description: "Brand-approved webinar copy."

callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/webinars/{{today}}-*-design-spec.md
      description: "Canvas design specification for the webinar deck."
      required_sections:
        - slide type
        - layout pattern
        - background
  state_updates:
    - description: "Canvas translates the approved copy into a layout and token plan."
  prohibited_actions:
    - tool: vercel.deploy
      reason: "Canvas produces specs, not deployments."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-brand
      to_agent: agents-frontend-designer
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/webinars/{{today}}-*-design-spec.md
    - type: artifact_contains
      path: memory/drafts/webinars/{{today}}-*-design-spec.md
      sections:
        - slide type
        - layout pattern
        - background
