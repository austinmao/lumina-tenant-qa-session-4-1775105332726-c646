version: '1.0'
target:
  type: skill
  path: skills/campaigns/strategy/funnel-strategy
  trigger: /funnel-strategy
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: funnel-strategy-smoke
  description: Design a conversion funnel for a high-ticket retreat offer.
  tags:
  - smoke
  - p0
  when:
    invoke: /funnel-strategy Design a funnel for the $5,995 Awaken Together psilocybin
      retreat
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/funnel-strategy-plan.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/funnel-strategy-plan.md
    sections:
    - funnel
    - stage
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: funnel-strategy-edge-low-traffic
  description: Funnel strategy accounts for low-traffic optimization constraints.
  tags:
  - edge
  - p1
  when:
    invoke: /funnel-strategy Optimize funnel for a niche audience with under 500 monthly
      visitors
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/funnel-strategy-plan.md
    sections:
    - traffic
  - type: no_span_errors
