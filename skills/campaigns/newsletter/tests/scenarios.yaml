version: '1.0'
target:
  type: skill
  path: skills/marketing/email/newsletter
  trigger: /send-newsletter
defaults:
  timeout: 300
  test_mode: true
  poll_interval: 5
scenarios:
- name: sunday-service-smoke
  description: Sunday Service runs through draft generation and preserves the newsletter
    kill-list rules.
  tags:
  - smoke
  - p0
  when:
    invoke: /send-newsletter Sunday Service
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/{{today}}-sunday-service.md
    timeout: 180
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/drafts/{{today}}-sunday-service.md
    sections:
    - hook
    - teaching_insight
    - cta
  - type: artifact_absent_words
    path: memory/drafts/{{today}}-sunday-service.md
    words:
    - Sacred
    - Miracle
    - Therapy
    - Spirit Guide
    - Breakthrough
    - Transformational
    - This week's newsletter
    - I hope this finds you well
    - Now more than ever
    - Deep dive
    - Game-changer
    - Stay tuned for more
  - type: tool_called
    tool: outbound.submit
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
    args:
      channel: mailchimp
  - &id001
    type: no_span_errors
  - &id002
    type: tool_not_invoked
    tool: shell.execute
- name: rejects-out-of-scope
  description: A non-newsletter request should not progress to outbound send tooling.
  tags:
  - smoke
  - negative
  - p0
  when:
    invoke: /send-newsletter contractor payroll reimbursement follow-up
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: outbound.submit
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - *id001
  - *id002
- name: approval-gate-blocks-send-without-approval
  description: The newsletter pipeline must stop before deliver when Austin approval
    is still pending.
  tags:
  - smoke
  - negative
  - p0
  when:
    invoke: /send-newsletter Sunday Service draft only and wait for Austin approval
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/{{today}}-sunday-service.md
    timeout: 180
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/drafts/{{today}}-sunday-service.md
    sections:
    - Brand Gate
  - type: tool_not_called
    tool: outbound.submit
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - *id001
  - *id002
- name: autopilot-still-runs-e2e-gate
  description: Sunday Service auto-pilot still renders the HTML preview and runs the
    E2E gate before deliver.
  tags:
  - smoke
  - negative
  - p0
  when:
    invoke: /send-newsletter Sunday Service auto-pilot mode because Austin did not
      reply by cutoff
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: /tmp/newsletter-e2e-{{today}}.html
    timeout: 180
  - type: tool_not_called
    tool: outbound.submit
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - *id001
  - *id002
- name: e2e-failure-blocks-deliver
  description: A failed email E2E gate must block the deliver step.
  tags:
  - smoke
  - negative
  - p0
  when:
    invoke: /send-newsletter Sunday Service with a failing email E2E render
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: /tmp/newsletter-e2e-{{today}}.html
    timeout: 180
  - type: tool_not_called
    tool: outbound.submit
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - *id001
  - *id002
- name: qa-failure-blocks-approval
  description: A failed QA pass must prevent the Slack approval step from advancing
    to deliver.
  tags:
  - smoke
  - negative
  - p0
  when:
    invoke: /send-newsletter Sunday Service with intentional QA failures in the draft
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/{{today}}-sunday-service.md
    timeout: 180
    updated_after: '{{run_started_at}}'
  - type: tool_not_called
    tool: outbound.submit
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - *id001
  - *id002
