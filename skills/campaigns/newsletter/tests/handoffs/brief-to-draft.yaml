version: "1.0"
handoff:
  from: skills-newsletter-sub-skills-brief
  to: skills-newsletter-sub-skills-draft
  mechanism: sessions_spawn
caller_provides:
  required_context:
    - name: content_brief
      description: Structured brief with events, signals, trend context, and CTA direction.
  required_artifacts:
    - path_pattern: memory/drafts/{{today}}-sunday-service-brief.md
      description: Newsletter brief for the current issue.
callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/{{today}}-sunday-service.md
      description: Full newsletter draft with Chain-of-Draft log, subject lines, and body.
      required_sections:
        - Chain-of-Draft Log
        - Subject Lines
        - Body
        - Brand Gate
  prohibited_actions:
    - tool: resend.send
      reason: Draft generation must not send or schedule outbound mail.
assertions:
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/{{today}}-sunday-service.md
    - type: artifact_contains
      path: memory/drafts/{{today}}-sunday-service.md
      sections:
        - Chain-of-Draft Log
        - Subject Lines
        - Brand Gate

