version: "1.0"
handoff:
  from: skills-newsletter-sub-skills-draft
  to: skills-newsletter-sub-skills-gate
  mechanism: sessions_spawn
caller_provides:
  required_context:
    - name: approved_cta_direction
      description: Single-destination CTA selected from the brief.
  required_artifacts:
    - path_pattern: memory/drafts/{{today}}-sunday-service.md
      description: Draft file waiting for the brand gate.
callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/{{today}}-sunday-service.md
      description: Gate-annotated draft with pass status or explicit flags.
      required_sections:
        - Brand Gate
  prohibited_actions:
    - tool: resend.send
      reason: Gate cannot bypass approval and deliver directly.
assertions:
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/{{today}}-sunday-service.md
    - type: artifact_contains
      path: memory/drafts/{{today}}-sunday-service.md
      sections:
        - Brand Gate

