version: "1.0"
handoff:
  from: skills-newsletter
  to: skills-newsletter-sub-skills-segment
  mechanism: sessions_spawn
caller_provides:
  required_context:
    - name: newsletter_type
      description: Newsletter type selected by the root orchestrator.
    - name: send_window
      description: Scheduled send window and approval mode for this issue.
callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/{{today}}-sunday-service-segment.md
      description: Segment manifest with send counts and suppression log.
      required_sections:
        - Send List Counts
        - Per-Stage Overrides
        - Suppression Log
  prohibited_actions:
    - tool: resend.send
      reason: Segment resolution must never call outbound send tooling.
assertions:
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/{{today}}-sunday-service-segment.md
    - type: artifact_contains
      path: memory/drafts/{{today}}-sunday-service-segment.md
      sections:
        - Send List Counts
        - Suppression Log

