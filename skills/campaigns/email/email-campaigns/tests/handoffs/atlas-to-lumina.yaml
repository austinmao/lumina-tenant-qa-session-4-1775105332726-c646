version: "1.0"

handoff:
  from: agents-marketing-campaign-orchestrator
  to: agents-marketing-email
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: sequence_goal
      description: "Single-offer campaign objective and audience stage."
    - name: segment_context
      description: "Audience segmentation and urgency facts confirmed during intake."
  required_artifacts:
    - path_pattern: memory/campaigns/{{today}}-*.md
      description: "Campaign staging brief with topic, segment, and funnel structure."

callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/{{today}}-sequence-*.md
      description: "Email sequence draft staged for approval."
      required_sections:
        - Sequence overview
        - Email 1
        - Approval gate reminder
  state_updates:
    - description: "Lumina drafts the email sequence without sending it."
  prohibited_actions:
    - tool: resend.send
      reason: "Lumina writes copy only."
    - tool: sms-outreach
      reason: "Delivery remains blocked until later approval gates."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-campaign-orchestrator
      to_agent: agents-marketing-email
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/{{today}}-sequence-*.md
    - type: artifact_contains
      path: memory/drafts/{{today}}-sequence-*.md
      sections:
        - Sequence overview
        - Email 1
