version: "1.0"

handoff:
  from: agents-marketing-campaign-orchestrator
  to: agents-frontend-designer
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: page_goal
      description: "The landing page objective and one primary CTA for the campaign."
    - name: approved_copy_path
      description: "Brand-reviewed copy path for the page design brief."
  required_artifacts:
    - path_pattern: memory/drafts/copy/{{today}}-*.md
      description: "Brand-reviewed landing page copy."

callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/design/{{today}}-*.md
      description: "Canvas design specification for the landing page."
      required_sections:
        - Wireframe
        - Color
        - Typography
  state_updates:
    - description: "Canvas produces a design spec before any frontend implementation begins."
  prohibited_actions:
    - tool: vercel.deploy
      reason: "Canvas produces design specs only."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-campaign-orchestrator
      to_agent: agents-frontend-designer
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/design/{{today}}-*.md
    - type: artifact_contains
      path: memory/drafts/design/{{today}}-*.md
      sections:
        - Wireframe
        - Typography
