version: "1.0"

handoff:
  from: agents-marketing-email
  to: agents-marketing-email-engineer
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: template_domain
      description: "Whether the email uses onboarding, marketing, or sales template conventions."
    - name: approved_header_photo
      description: "Photo selections, once approved, include CDN URLs plus alt text."
  required_artifacts:
    - path_pattern: memory/drafts/{{today}}-sequence-*.md
      description: "Email sequence copy ready for HTML implementation."

callee_produces:
  required_artifacts:
    - path_pattern: memory/template-state.json
      description: "Template registry and dry-run tracking state updated by Forge."
  state_updates:
    - description: "Forge converts the approved copy draft into a review-ready email template without sending it."
  prohibited_actions:
    - tool: resend.send
      reason: "Forge engineers templates and does not deliver campaigns."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-email
      to_agent: agents-marketing-email-engineer
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: state_file
      path: memory/template-state.json
