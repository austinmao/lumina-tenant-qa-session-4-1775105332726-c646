version: "1.0"

handoff:
  from: agents-marketing-campaign-orchestrator
  to: agents-marketing-copywriter
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: campaign_type
      description: "Whether the campaign is a webinar, retreat, workshop, or newsletter."
    - name: target_segment
      description: "Audience segment and campaign goal from intake."
    - name: approved_photos_gate
      description: "Photo selections are pending Austin approval and must stay staged."
  required_artifacts:
    - path_pattern: memory/campaigns/{{today}}-*.md
      description: "Campaign staging brief with topic, segment, and supporting research."

callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/copy/{{today}}-*.md
      description: "Landing page copy draft for the campaign."
      required_sections:
        - Headline
        - Subheadline
        - CTA
  state_updates:
    - description: "Quill drafts the landing page copy and returns it for review."
  prohibited_actions:
    - tool: resend.send
      reason: "Quill drafts copy only."
    - tool: vercel.deploy
      reason: "Copy generation must not publish the page."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-campaign-orchestrator
      to_agent: agents-marketing-copywriter
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/copy/{{today}}-*.md
    - type: artifact_contains
      path: memory/drafts/copy/{{today}}-*.md
      sections:
        - Headline
        - CTA
