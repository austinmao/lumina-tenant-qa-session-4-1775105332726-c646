version: "1.0"

handoff:
  from: agents-marketing-campaign-orchestrator
  to: skills-event-api
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: event_payload
      description: "Collected event details including slug, start_at, timezone, and host fields."
    - name: approval_gate
      description: "Anchor creation happens only after the approval gate is satisfied."
  required_artifacts:
    - path_pattern: memory/campaigns/{{today}}-*.md
      description: "Approved campaign staging brief."

callee_produces:
  required_artifacts:
    - path_pattern: memory/logs/api-submits/{{today}}.md
      description: "API submit log containing the created or reused event id."
  state_updates:
    - description: "Event API creates or reuses the anchored event record."
  prohibited_actions:
    - tool: resend.send
      reason: "Anchor creation does not send outbound communications."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-campaign-orchestrator
      to_agent: skills-event-api
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: log_entry
      path: memory/logs/api-submits/{{today}}.md
      pattern: event_id
