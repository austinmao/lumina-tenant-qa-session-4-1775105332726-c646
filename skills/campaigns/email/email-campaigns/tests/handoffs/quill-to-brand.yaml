version: "1.0"

handoff:
  from: agents-marketing-copywriter
  to: agents-marketing-brand
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: brand_pillars
      description: "Brand voice, proof, and transformation constraints."
    - name: approval_policy
      description: "All campaign delivery remains blocked until Austin approves the staged package."
  required_artifacts:
    - path_pattern: memory/drafts/copy/{{today}}-*.md
      description: "Landing page copy draft awaiting brand review."

callee_produces:
  required_artifacts:
    - path_pattern: memory/drafts/copy/{{today}}-*.md
      description: "Brand-reviewed landing page copy."
      required_sections:
        - Headline
        - CTA
  state_updates:
    - description: "Brand reviews the copy for voice, claims, and approval posture before the workflow advances."
  prohibited_actions:
    - tool: resend.send
      reason: "Brand reviews copy and does not send."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-copywriter
      to_agent: agents-marketing-brand
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: artifact_exists
      path: memory/drafts/copy/{{today}}-*.md
    - type: artifact_contains
      path: memory/drafts/copy/{{today}}-*.md
      sections:
        - Headline
        - CTA
