version: "1.0"

handoff:
  from: agents-marketing-campaign-orchestrator
  to: skills-offer-api
  mechanism: sessions_spawn

caller_provides:
  required_context:
    - name: offer_payload
      description: "Collected offer details including title, slug, and actual price."
    - name: approval_gate
      description: "Offer creation happens only after the approval gate is satisfied."
  required_artifacts:
    - path_pattern: memory/campaigns/{{today}}-*.md
      description: "Approved campaign staging brief."

callee_produces:
  required_artifacts:
    - path_pattern: memory/logs/api-submits/{{today}}.md
      description: "API submit log containing the created or reused offer id."
  state_updates:
    - description: "Offer API creates or reuses the commercial offer anchor."
  prohibited_actions:
    - tool: resend.send
      reason: "Offer creation does not send outbound communications."

assertions:
  pre_delegation:
    - type: delegation_occurred
      from_agent: agents-marketing-campaign-orchestrator
      to_agent: skills-offer-api
      log_path: /tmp/openclaw/openclaw-{{today}}.log
      run_id: "{{run_id}}"
  post_delegation:
    - type: log_entry
      path: memory/logs/api-submits/{{today}}.md
      pattern: offer_id
