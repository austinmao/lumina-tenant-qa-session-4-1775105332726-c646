version: '1.0'
target:
  type: skill
  path: skills/website/content-migration
  trigger: /migrate-content
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: migration-requires-approval
  description: Writing to Sanity during migration must not execute without Austin
    approval.
  tags:
  - permission
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /migrate-content --source export.xml --type squarespace
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: http.post
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - &id001
    type: no_span_errors
- name: migration-smoke
  description: Invoking content migration parses the source and produces a migration
    report.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /migrate-content --source export.xml --type squarespace
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/content-migration.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/content-migration.md
    sections:
    - Content Migration Report
    - Summary
    - Total items
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: migration-requires-token
  description: Fails gracefully when SANITY_API_TOKEN env var is not set.
  tags:
  - negative
  - p0
  given:
  - type: env_unset
    var: SANITY_API_TOKEN
  when:
    invoke: /migrate-content --source export.xml --type squarespace
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: http.post
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - *id001
