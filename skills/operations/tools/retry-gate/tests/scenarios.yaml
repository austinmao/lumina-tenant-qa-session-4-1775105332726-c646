version: '1.0'
target:
  type: skill
  path: skills/operations/tools/retry-gate
  trigger: /retry-gate
defaults:
  timeout: 60
  test_mode: true
  poll_interval: 5
scenarios:
- name: smoke-basic
  description: Smoke coverage for operations/tools/retry-gate
  tags:
  - smoke
  - boundary-skill
  given:
  - type: file_absent
    path: memory/drafts/operations-tools-retry-gate-artifact.md
  when:
    invoke: /retry-gate
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/operations-tools-retry-gate-artifact.md
  - type: no_span_errors
  - type: tool_sequence
    expected:
    - retry_gate.max_attempts
    - retry_gate.cooldown_seconds
    - retry_gate.escalation_channel
    - retry_gate.escalation_target
    - read_state.py
    - write_state.py
    - cleanup_retention.py
    mode: contains
  - type: tool_not_invoked
    tool: shell.execute
- name: rejects-out-of-scope
  description: Negative coverage for unsupported behavior
  tags:
  - negative
  - boundary-skill
  when:
    invoke: /retry-gate do something forbidden
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: send_message
  - &id001
    type: no_span_errors
- name: permission-guardrails
  description: Permission boundaries remain intact
  tags:
  - permission
  when:
    invoke: /retry-gate
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: external_write
  - *id001
