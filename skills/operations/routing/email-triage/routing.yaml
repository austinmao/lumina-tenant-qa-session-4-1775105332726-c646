# Email Triage Routing Registry
# skills/operations/email-triage/routing.yaml
#
# HOW TO ADD A NEW AGENT:
#   - New leaf agent under an existing domain → update that domain's coordinator only.
#     email-triage does not need to change; the coordinator handles internal routing.
#   - New domain entirely → add a new entry under `domains` with a coordinator agent
#     and its classification signals. Bump the version.
#
# TIERED ROUTING CONTRACT:
#   email-triage routes to coordinators only, never to leaf agents.
#   Coordinators own all internal sub-agent routing within their domain.
#
# DRAFT REPLY CONTRACT:
#   draft_reply: true  → triage drafts a preliminary reply using RAG; coordinator reviews.
#   draft_reply: false → coordinator owns the draft entirely; triage writes a handoff
#                        stub only. Triage must NOT draft a reply for these domains.
#
# APPROVAL POLICY (ALL DOMAINS):
#   Every outbound reply requires Austin's explicit approval via /approve-reply {email_id}
#   regardless of draft_reply value. No email is ever sent automatically.
#   Exception: UNSUBSCRIBE replies are sent immediately as a compliance action — no approval needed.
#
# Last updated: 2026-03-06 (v1.5.0: CORPUS domain normalized into domains; hook starter entries insert before cross_domain)

version: "1.5.0"

domains:

  SALES:
    coordinator: agents/sales/director
    draft_reply: true
    draft_owner: triage
    description: >
      Pricing questions, retreat interest, booking inquiries, discovery call
      replies, objections, nurture sequence replies, Calendly-related messages,
      deal follow-up.
    signals:
      - pricing questions
      - retreat interest
      - booking inquiry
      - discovery call reply
      - objection (cost, timing, uncertainty)
      - nurture sequence reply
      - Calendly-related message
      - deal follow-up

  ONBOARDING:
    coordinator: agents/programs/onboarding/intake-coordination
    draft_reply: false
    draft_owner: coordinator
    description: >
      Application status, intake form questions, program agreement questions,
      Zoho Sign questions, pre-enrollment logistics, post-booking "what's next"
      questions, and any health-related questions that surface before or after
      booking. intake-coordination routes internally to application-screening
      and medical-screening as needed. Triage must NOT draft replies for
      health-related content — medical-screening owns that framing.
    signals:
      - application status or eligibility
      - intake form not received or technical issue
      - program agreement or Zoho Sign question
      - pre-enrollment logistics
      - "I just booked, what's next?"
      - health question related to participation
      - medication or SSRI question
      - contraindication or medical history question

  PREPARATION:
    coordinator: agents/programs/preparation/participant-prep
    draft_reply: false
    draft_owner: coordinator
    description: >
      Retreat logistics for confirmed, fully-onboarded participants: arrival
      time, packing list, dietary needs, WhatsApp group access, payment
      balance inquiries, venue/address questions, travel coordination.
      A participant who self-identifies as "registered," "paid," "confirmed,"
      or "booked" and asks any logistical question routes here — even if the
      word "address" or "location" isn't used explicitly.
    signals:
      - retreat address or location for travel or flight planning
      - arrival time or directions
      - what to bring or packing list
      - dietary restriction or allergy update
      - WhatsApp group invite not received
      - payment balance or payment plan
      - venue or accommodation question
      - travel coordination from a confirmed participant
      - sender states they are registered, paid, or booked and asks a logistics question

  MARKETING:
    coordinator: agents/marketing/email
    draft_reply: true
    draft_owner: triage
    description: >
      Newsletter replies, event announcement replies, re-engagement campaign
      replies, unsubscribe requests from marketing list, general brand
      questions, press and partnership inquiries.
    signals:
      - newsletter reply
      - event announcement reply
      - re-engagement campaign reply
      - unsubscribe from marketing list
      - general brand question
      - press or media inquiry
      - partnership or collaboration inquiry

  GENERAL:
    coordinator: null
    draft_reply: false
    draft_owner: null
    description: >
      Support questions that do not fit any domain above; alumni check-ins
      with no action intent. No coordinator agent yet — queued for rep review.
    signals:
      - alumni check-in with no specific ask
      - general question that doesn't fit sales, onboarding, preparation, or marketing

  CUSTOMER_SUPPORT:
    coordinator: null
    draft_reply: false
    draft_owner: null
    description: >
      Post-retreat follow-up and support from existing customers or alumni
      with a specific ask: refund or cancellation requests after retreat,
      certificate or recommendation letter requests, technical issues with
      the booking or participant portal. No coordinator agent yet — queued
      for rep review, same as GENERAL.
    signals:
      - post-retreat support request or follow-up with a specific ask
      - alumni requesting retreat certificate or letter of completion
      - alumni requesting recommendation letter
      - refund or cancellation request after retreat has occurred
      - technical issue with booking system or participant portal
      - complaint or formal feedback about a completed retreat

  FINANCE:
    coordinator: agents/finance/payroll
    draft_reply: false
    draft_owner: coordinator
    description: >
      Contractor invoice submissions, Gusto payroll questions, expense
      reimbursement requests, W-9 or tax form requests, and finance-related
      inquiries from team members or contractors. finance/payroll owns all
      reply drafting; Austin approval required per-session before any send.
    signals:
      - contractor invoice submission or payment request
      - payroll question or Gusto access question
      - expense reimbursement request
      - W-9 or tax form request
      - finance or accounting inquiry from a team member or contractor

  CORPUS:
    coordinator: agents/corpus/transcript-curator
    draft_reply: false
    draft_owner: coordinator
    description: >
      Transcript uploads, recording-to-transcript follow-up, corpus indexing
      requests, Chroma sync questions, or Austin-teachings archive requests.
    signals:
      - transcript upload or transcript file follow-up
      - recording transcription request
      - corpus indexing or Chroma sync request
      - archive request for Austin teachings or past transcripts
      - transcript processing status question

