version: '1.0'
target:
  type: skill
  path: skills/content/voice/humanizer
  trigger: /humanize
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: humanizer-smoke
  description: Invoking humanize on AI-patterned text produces rewritten output with
    AI patterns removed.
  tags:
  - smoke
  - p0
  when:
    invoke: /humanize "In today's rapidly evolving landscape, it's crucial to delve
      into the transformative potential of psychedelic healing. This comprehensive
      guide explores the multifaceted dimensions of this groundbreaking approach."
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/humanized-output.md
    timeout: 60
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: humanizer-detects-ai-patterns
  description: Humanizer identifies specific AI patterns (delve, landscape, multifaceted)
    in its analysis.
  tags:
  - edge
  - p1
  when:
    invoke: /humanize "Let's delve into the multifaceted landscape of this comprehensive
      and transformative journey"
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/drafts/humanized-output.md
    sections:
    - pattern
  - type: no_span_errors
