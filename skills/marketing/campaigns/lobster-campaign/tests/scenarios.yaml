version: '1.0'
target:
  type: skill
  path: skills/marketing/campaigns/lobster-campaign
  trigger: /lobster-campaign
defaults:
  timeout: 45
  test_mode: true
  poll_interval: 3
scenarios:
- name: smoke-basic
  description: Smoke coverage for marketing/campaigns/lobster-campaign
  tags:
  - smoke
  - interior-skill
  given:
  - type: file_absent
    path: memory/drafts/marketing-campaigns-lobster-campaign-artifact.md
  when:
    invoke: /lobster-campaign
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/marketing-campaigns-lobster-campaign-artifact.md
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: rejects-out-of-scope
  description: Negative coverage for unsupported behavior
  tags:
  - negative
  - interior-skill
  when:
    invoke: /lobster-campaign do something forbidden
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: send_message
  - &id001
    type: no_span_errors
- name: permission-guardrails
  description: Permission boundaries remain intact
  tags:
  - permission
  when:
    invoke: /lobster-campaign
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: external_write
  - *id001
