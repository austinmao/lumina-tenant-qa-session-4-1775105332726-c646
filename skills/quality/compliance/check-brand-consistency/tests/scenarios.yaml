version: '1.0'
target:
  type: skill
  path: skills/website/check-brand-consistency
  trigger: /check-brand-consistency
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: brand-check-reads-site-context
  description: Invoking brand consistency check reads the asset-checklist from brand_root
    in site-context.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /check-brand-consistency --page /
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/brand-consistency.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/brand-consistency.md
    sections:
    - Brand Consistency Report
    - Compliance Score
    - Colors
    - Typography
  - &id001
    type: no_span_errors
  - &id002
    type: tool_not_invoked
    tool: shell.execute
- name: brand-check-catches-violation
  description: Brand check flags off-brand colors or fonts as issues in the report.
  tags:
  - smoke
  - p1
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /check-brand-consistency --page /test-offbrand
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/brand-consistency.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/brand-consistency.md
    sections:
    - Issues
    - Colors
  - *id001
  - *id002
- name: brand-check-no-site
  description: Invoking without an active site does not produce a brand report.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /check-brand-consistency --page /
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: fs.read
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
