version: '1.0'
target:
  type: skill
  path: skills/website/audit-accessibility
  trigger: /audit-accessibility
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: a11y-smoke
  description: Invoking accessibility audit produces a WCAG 2.2 report with severity-classified
    issues.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /audit-accessibility --page /
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/accessibility-audit.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/accessibility-audit.md
    sections:
    - Accessibility Audit
    - WCAG 2.2
    - Critical
    - Passed
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: a11y-no-site
  description: Invoking without an active site does not produce an accessibility report.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /audit-accessibility --page /
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: http.get
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
