version: '1.0'
target:
  type: skill
  path: skills/website/audit-web-quality
  trigger: /audit-web-quality
defaults:
  timeout: 120
  test_mode: true
scenarios:
- name: quality-smoke
  description: Invoking web quality audit produces a consolidated report with performance,
    accessibility, SEO, and best practice scores.
  tags:
  - smoke
  - p0
  given:
  - type: invoke
    command: /site tenant-b
    wait_for_artifact: memory/site-context.yaml
  when:
    invoke: /audit-web-quality --page /
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/web-quality-audit.md
    timeout: 120
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/web-quality-audit.md
    sections:
    - Web Quality Audit
    - Performance
    - Accessibility
    - SEO
    - Best Practices
    - Overall
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: quality-no-site
  description: Invoking without an active site does not produce a quality report.
  tags:
  - negative
  - p0
  given:
  - type: artifact_absent
    path: memory/site-context.yaml
  when:
    invoke: /audit-web-quality --page /
    params:
      test_mode: true
  then:
  - type: tool_not_called
    tool: http.get
    log_path: /tmp/openclaw/openclaw-{{today}}.log
    run_id: '{{run_id}}'
  - type: no_span_errors
