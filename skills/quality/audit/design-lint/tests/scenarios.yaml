version: '1.0'
target:
  type: skill
  path: skills/quality/audit/design-lint
  trigger: /design-lint
defaults:
  timeout: 60
  test_mode: true
scenarios:
- name: design-lint-smoke
  description: Smoke lint on a component produces a report with color, spacing, and
    typography compliance scores.
  tags:
  - smoke
  - p0
  when:
    invoke: /design-lint web/src/components/Hero.tsx
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/design-lint-report.md
    timeout: 60
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/design-lint-report.md
    sections:
    - Color Compliance
    - Spacing Compliance
    - Typography Compliance
    - Overall Score
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: design-lint-no-tokens
  description: Linting when no design tokens are defined produces a partial report
    noting the missing tokens.
  tags:
  - edge
  - p1
  when:
    invoke: /design-lint web/src/components/Placeholder.tsx
    params:
      test_mode: true
      mock_no_tokens: true
  then:
  - type: artifact_contains
    path: memory/reports/design-lint-report.md
    sections:
    - No design tokens found
  - type: no_span_errors
