version: '1.0'
target:
  type: skill
  path: skills/quality/testing/email-review
  trigger: /email-review
defaults:
  timeout: 90
  test_mode: true
scenarios:
- name: email-review-smoke
  description: Email review checks mobile responsiveness and deliverability.
  tags:
  - smoke
  - p0
  when:
    invoke: /email-review example.org
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/reports/email-review-report.md
    timeout: 90
    updated_after: '{{run_started_at}}'
  - type: artifact_contains
    path: memory/reports/email-review-report.md
    sections:
    - Mobile
    - Deliverability
    - Gmail
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: email-review-clipping
  description: Emails over 102KB are flagged for Gmail clipping.
  tags:
  - edge
  - p1
  when:
    invoke: /email-review example.org
    params:
      test_mode: true
  then:
  - type: artifact_contains
    path: memory/reports/email-review-report.md
    sections:
    - clipping
  - type: no_span_errors
