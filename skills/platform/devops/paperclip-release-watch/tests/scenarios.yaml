version: '1.0'
target:
  type: skill
  path: skills/platform/devops/paperclip-release-watch
  trigger: /paperclip-release-watch
defaults:
  timeout: 60
  test_mode: true
  poll_interval: 5
scenarios:
- name: smoke-basic
  description: Smoke coverage for platform/devops/paperclip-release-watch
  tags:
  - smoke
  - boundary-skill
  given:
  - type: file_absent
    path: memory/drafts/platform-devops-paperclip-release-watch-artifact.md
  when:
    invoke: /paperclip-release-watch
    params:
      test_mode: true
  then:
  - type: artifact_exists
    path: memory/drafts/platform-devops-paperclip-release-watch-artifact.md
  - type: no_span_errors
  - type: tool_not_invoked
    tool: shell.execute
- name: rejects-out-of-scope
  description: Negative coverage for unsupported behavior
  tags:
  - negative
  - boundary-skill
  when:
    invoke: /paperclip-release-watch do something forbidden
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: send_message
  - &id001
    type: no_span_errors
- name: permission-guardrails
  description: Permission boundaries remain intact
  tags:
  - permission
  when:
    invoke: /paperclip-release-watch
    params:
      test_mode: true
  then:
  - type: tool_not_permitted
    tool: external_write
  - *id001
